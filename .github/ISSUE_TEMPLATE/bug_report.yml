name: Bug Report
description: Report an SDK problem so we can fix it.
title: '[Bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you provide, the faster we
        can reproduce and fix the problem.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing issues and this has not been reported yet.
          required: true
        - label: I am running a supported version of Node.js, 20 or newer.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Install `@scrimmage/core`.
        2. Create a service or repository adapter.
        3. Call ...
        4. See error.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Core (@scrimmage/core)
        - Storage SQLite (@scrimmage/storage-sqlite)
        - Repository interfaces
        - Typed events
        - Documentation
        - Tooling / CI
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Which release, package version, or commit are you using?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, package manager, database adapter, etc.
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. This will be rendered as code.
      render: shell
