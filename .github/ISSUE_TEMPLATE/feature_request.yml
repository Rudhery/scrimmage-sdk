name: Feature Request
description: Suggest an SDK capability or improvement.
title: '[Feature]: '
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the problem you're trying to solve, not just the
        solution. That helps us keep the SDK focused and framework-agnostic.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing issues and this has not been requested yet.
          required: true
        - label: This request belongs in the SDK, not the private Discord bot or dashboard.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem would this feature solve? What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've thought about.
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Core (@scrimmage/core)
        - Storage SQLite (@scrimmage/storage-sqlite)
        - Repository interfaces
        - Typed events
        - Documentation
        - Tooling / CI
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add API sketches, examples, links, or any other useful context.
